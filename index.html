<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Heavy Obfuscator</title>
<style>
body {
    background:#000;
    color:#0f0;
    font-family:monospace;
    text-align:center;
}
h2 { margin-bottom: 5px; }
small { color: #888; }
textarea {
    width:90%;
    height:200px;
    margin:10px;
    background:#111;
    color:#0f0;
    padding:10px;
    border:1px solid #0f0;
}
</style>
</head>
<body>

<h2>Heavy Obfuscator</h2>
<small>by ChillyHubdz</small>

<textarea id="input" placeholder="Dán code vào đây..."></textarea>
<textarea id="output" placeholder="Auto obf..."></textarea>

<script>
function toOctal(str) {
    let res = "";
    for (let i = 0; i < str.length; i++) {
        res += "\\" + str.charCodeAt(i).toString(8);
    }
    return res;
}

function randomNoise() {
    let noise = "";
    for (let i = 0; i < 300; i++) {
        noise += Math.random().toString(36).substring(2);
    }
    return noise;
}

function obfuscate() {
    let code = document.getElementById("input").value;
    if (!code.trim()) return;

    let encoded = toOctal(code);

    let f1 = "_0x" + Math.random().toString(36).substring(2);
    let f2 = "_0x" + Math.random().toString(36).substring(2);
    let f3 = "_0x" + Math.random().toString(36).substring(2);

    let final = `
(function(){
    function ${f1}(){
        return "${encoded}";
    }

    function ${f2}(){
        return "${randomNoise()}";
    }

    function ${f3}(){
        return (${f1})();
    }

    (function(){
        try{
            let _data = ${f3}();
            
            // fake loop làm rối
            for(let i=0;i<30;i++){
                ${f2}();
            }

            // chạy thật
            return eval(_data);

        }catch(e){}
    })();

})();
`;

    document.getElementById("output").value = final;

    // auto download
    let blob = new Blob([final], {type:"application/javascript"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "heavy-obf.js";
    a.click();
}

// auto khi dán
document.getElementById("input").addEventListener("input", () => {
    obfuscate();
});
</script>

</body>
  </html>
